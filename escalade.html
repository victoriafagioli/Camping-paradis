<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#34BDEF">
  <meta name="description" content="Escalade, accrobranche et via ferrata autour du Camping Paradis - Les Gorges du Haut Bugey.">
  <title>Escalade, accrobranche et via ferrata · Camping Paradis</title>
  <style>
    :root {
      --brand: #34BDEF;
      --brand-soft: #e8f7fe;
      --bg: #f4f6f8;
      --card: #ffffff;
      --text: #1c2733;
      --muted: #6b7785;
      --line: #e7ebef;
      --shadow: 0 8px 24px rgba(20, 40, 60, .08);
      --radius: 18px;
    }
    body.dark {
      --brand: #34BDEF;
      --brand-soft: #12313d;
      --bg: #0e161d;
      --card: #18242e;
      --text: #eaf1f6;
      --muted: #93a2af;
      --line: #243441;
      --shadow: 0 8px 24px rgba(0, 0, 0, .35);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.5;
      padding-bottom: 90px;
      transition: background .3s, color .3s;
    }

    /* ---------- Header ---------- */
    header {
      position: sticky;
      top: 0;
      z-index: 50;
      background: var(--card);
      border-bottom: 1px solid var(--line);
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 14px 16px;
    }
    .back {
      width: 38px; height: 38px;
      border: none;
      border-radius: 12px;
      background: var(--brand-soft);
      color: var(--brand);
      font-size: 20px;
      display: grid;
      place-items: center;
      cursor: pointer;
      flex-shrink: 0;
    }
    header h1 {
      font-size: 17px;
      font-weight: 700;
      line-height: 1.25;
    }
    header .sub { font-size: 12px; color: var(--muted); font-weight: 500; }

    /* ---------- Tabs ---------- */
    .tabs-wrap {
      position: sticky;
      top: 67px;
      z-index: 40;
      background: var(--bg);
      padding: 12px 0 6px;
    }
    .tabs {
      display: flex;
      gap: 8px;
      overflow-x: auto;
      padding: 0 16px 6px;
      scroll-behavior: smooth;
      -ms-overflow-style: none;
      scrollbar-width: none;
    }
    .tabs::-webkit-scrollbar { display: none; }
    .tab {
      flex-shrink: 0;
      border: 1px solid var(--line);
      background: var(--card);
      color: var(--text);
      font-size: 13px;
      font-weight: 600;
      padding: 9px 15px;
      border-radius: 999px;
      cursor: pointer;
      white-space: nowrap;
      transition: all .2s;
    }
    .tab.active {
      background: var(--brand);
      border-color: var(--brand);
      color: #fff;
      box-shadow: 0 4px 12px rgba(52, 189, 239, .35);
    }

    /* ---------- Card ---------- */
    .container { padding: 8px 16px 0; }
    .card {
      background: var(--card);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      overflow: hidden;
      animation: fade .35s ease;
    }
    @keyframes fade { from { opacity: 0; transform: translateY(8px);} to { opacity: 1; transform: none; } }

    .card-head { padding: 20px 20px 0; }
    .card-head h2 { font-size: 20px; font-weight: 800; line-height: 1.25; }
    .card-head .desc { margin-top: 10px; color: var(--muted); font-size: 14.5px; }
    .card-head .guide {
      margin-top: 12px;
      display: inline-block;
      font-size: 12.5px;
      font-weight: 600;
      color: var(--brand);
      background: var(--brand-soft);
      padding: 5px 11px;
      border-radius: 999px;
    }
    .divider { height: 1px; background: var(--line); margin: 18px 20px; }

    .rows { padding: 0 20px 22px; }
    .row {
      display: flex;
      gap: 14px;
      padding: 12px 0;
      border-bottom: 1px solid var(--line);
    }
    .row:last-child { border-bottom: none; }
    .ico {
      width: 38px; height: 38px;
      flex-shrink: 0;
      border-radius: 11px;
      background: var(--brand-soft);
      color: var(--brand);
      display: grid;
      place-items: center;
    }
    .ico svg { width: 19px; height: 19px; }
    .row-body { flex: 1; min-width: 0; }
    .row-label {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: .06em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 3px;
    }
    .row-value { font-size: 14.5px; color: var(--text); }
    .row-value ul { list-style: none; }
    .row-value li { padding: 1px 0; }
    .row-value a { color: var(--brand); text-decoration: none; font-weight: 600; word-break: break-word; }
    .row-value a:active { opacity: .6; }

    .cta-web {
      display: block;
      text-align: center;
      margin: 4px 20px 22px;
      padding: 14px;
      background: var(--brand);
      color: #fff;
      font-weight: 700;
      font-size: 15px;
      border-radius: 14px;
      text-decoration: none;
      box-shadow: 0 6px 16px rgba(52, 189, 239, .35);
    }

    /* ---------- Floating call ---------- */
    .call {
      position: fixed;
      bottom: 20px; right: 16px;
      z-index: 60;
      display: flex;
      align-items: center;
      gap: 8px;
      background: var(--brand);
      color: #fff;
      text-decoration: none;
      font-weight: 700;
      font-size: 14px;
      padding: 13px 18px;
      border-radius: 999px;
      box-shadow: 0 8px 22px rgba(52, 189, 239, .45);
    }
    .call svg { width: 18px; height: 18px; }

    footer {
      text-align: center;
      color: var(--muted);
      font-size: 12px;
      padding: 26px 20px 8px;
    }
  </style>
</head>
<body>
  <header>
    <button class="back" onclick="history.back()" aria-label="Retour">‹</button>
    <div>
      <h1>Escalade, accrobranche &amp; via ferrata</h1>
      <span class="sub">Autour du Camping Paradis</span>
    </div>
  </header>

  <div class="tabs-wrap">
    <div class="tabs" id="tabs"></div>
  </div>

  <div class="container">
    <div class="card" id="card"></div>

        dates: "Toute l'année, tous les jours.",

      },
      {

        titre: "Canyoning, Escalade, Via Ferrata avec Rock'n Jump Adventure",
        desc: "Rock'n Jump Adventure vous emmène faire de l'escalade en falaise et en salle dans le Jura, la Haute-Savoie et le Pays de Gex. Prenez de la hauteur et voyez le monde d'un autre angle ! Escalade en couennes, grandes voies, terrain d'aventure et blocs.",

    var tabsEl = document.getElementById('tabs');
    var cardEl = document.getElementById('card');

    function row(icon, label, valueHtml) {
      return '<div class="row"><div class="ico">' + icon + '</div>' +
             '<div class="row-body"><div class="row-label">' + label + '</div>' +
             '<div class="row-value">' + valueHtml + '</div></div></div>';
    }
    function list(items) {
      if (items.length === 1) return items[0];
      return '<ul>' + items.map(function (i) { return '<li>• ' + i + '</li>'; }).join('') + '</ul>';
    }
    function telPretty(t) {
      return t.replace(/(\d{2})(?=\d)/g, '$1 ').trim();
    }

    function render(i) {
      var a = ACTIVITES[i];
      var html = '<div class="card-head"><h2>' + a.titre + '</h2>' +
                 '<p class="desc">' + a.desc + '</p>';
      if (a.infoLigne) html += '<p class="desc" style="margin-top:8px;font-weight:600;color:var(--brand)">' + a.infoLigne + '</p>';
      if (a.guide) html += '<span class="guide">' + a.guide + '</span>';
      html += '</div><div class="divider"></div><div class="rows">';

      if (a.prix) html += row(ICONS.prix, 'Prix', list(a.prix));
      if (a.adresse) html += row(ICONS.adresse, 'Adresse', a.adresse);
      if (a.conseils) html += row(ICONS.conseils, 'Conseils', list(a.conseils));
      if (a.dates) html += row(ICONS.dates, 'Dates', a.dates);
      if (a.tel) html += row(ICONS.tel, 'Téléphone', '<a href="tel:+33' + a.tel.replace(/^0/, '') + '">' + telPretty(a.tel) + '</a>');
      html += '</div>';

      if (a.web) html += '<a class="cta-web" href="' + a.web + '" target="_blank" rel="noopener">Visiter le site web →</a>';

      cardEl.innerHTML = html;

      var tabs = tabsEl.children;
      for (var k = 0; k < tabs.length; k++) tabs[k].classList.toggle('active', k === i);
      tabs[i].scrollIntoView({ inline: 'center', block: 'nearest', behavior: 'smooth' });
    }

    ACTIVITES.forEach(function (a, i) {
      var b = document.createElement('button');
      b.className = 'tab';
      b.textContent = a.tab;
      b.onclick = function () { render(i); };
      tabsEl.appendChild(b);
    });

    render(0);
  </script>
</body>
</html>
